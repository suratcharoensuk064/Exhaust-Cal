<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Engine Exhaust Analysis</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333; }\n        .container { width: 80%; margin: auto; overflow: hidden; }\n        header { background: #35424a; color: #ffffff; padding: 20px; text-align: center; }\n        form { margin: 20px 0; }\n        input[type='number'] { width: 100%; padding: 10px; margin: 5px 0; }\n        button { padding: 10px; background: #35424a; color: white; border: none; cursor: pointer; }\n        .results { background: #ffffff; padding: 20px; border-radius: 5px; }\n        footer { text-align: center; margin-top: 20px; }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>Engine Exhaust Analysis Dashboard</h1>\n    </header>\n    <div class="container">\n        <form id="exhaustForm">\n            <label for="rpm">Engine RPM:</label>\n            <input type="number" id="rpm" required>\n            <label for="pressure">Exhaust Pressure (Pa):</label>\n            <input type="number" id="pressure" required>\n            <button type="submit">Analyze</button>\n        </form>\n        <div class="results" id="resultDisplay"></div>\n    </div>\n    <footer>\n        <p>2026 Engine Exhaust Analysis</p>\n    </footer>\n    <script>\n        document.getElementById('exhaustForm').addEventListener('submit', function(event) {\n            event.preventDefault();\n            const rpm = document.getElementById('rpm').value;\n            const pressure = document.getElementById('pressure').value;\n            // Simple calculation for demonstration\n            const exhaustFlow = (rpm * pressure) / 1000;\n            document.getElementById('resultDisplay').innerHTML = `<h2>Analysis Result:</h2><p>Exhaust Flow: ${exhaustFlow.toFixed(2)} m³/s</p>`;\n        });\n    <\/script>\n</body>\n</html>
